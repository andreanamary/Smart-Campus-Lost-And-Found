<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<header>
    <h1>🎒 Smart Campus Lost & Found Management System</h1>
</header>

<nav>
    <a href="/">Home</a>
    <a href="/login">Login</a>
</nav>

<div class="container">

<h2>Create Account</h2>

<form method="POST">

<label>Full Name</label>
<input type="text"
       name="fullname"
       required>

<label>Email</label>
<input type="email"
       name="email"
       required>

<label>Password</label>
<input type="password"
       name="password"
       required>

<button type="submit">
Register
</button>

</form>

</div>

<footer>

©2026 Smart Campus Lost & Found Portal

</footer>

</body>
</html>
